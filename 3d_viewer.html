<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3d</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d14;color:#e2e8f0;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh}
#canvas{display:block;width:100%;height:100vh}
#loading{position:fixed;inset:0;background:#0a0d14;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;gap:12px}
.spinner{width:36px;height:36px;border:3px solid #1e2235;border-top-color:#22c55e;
  border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text{font-size:13px;color:#64748b}

#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10}
.top-bar{background:rgba(10,13,20,.88);backdrop-filter:blur(8px);border-bottom:1px solid #1e2235;
  padding:10px 16px;display:flex;align-items:center;gap:12px;pointer-events:all;flex-wrap:wrap}
.logo{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.logo span{color:#22c55e}
.badge{font-size:9.5px;background:#14532d;color:#4ade80;padding:2px 8px;border-radius:10px;
  font-weight:700;letter-spacing:.3px}
.view-btns{display:flex;gap:6px;margin-left:auto}
.vb{padding:6px 13px;border-radius:6px;border:1.5px solid #2a2d3e;background:transparent;
  color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s}
.vb:hover{border-color:#3b82f6;color:#93c5fd}
.vb.on{background:#1d4ed8;border-color:#3b82f6;color:#fff}

#popup{position:fixed;pointer-events:none;z-index:20;display:none;
  background:rgba(15,23,42,.97);border:1.5px solid #334155;
  border-radius:10px;padding:12px 15px;min-width:210px;max-width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.5)}
.pop-title{font-size:13px;font-weight:800;color:#fff;margin-bottom:6px}
.pop-sub{font-size:11px;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}
.pop-row{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;
  border-bottom:1px solid #1e293b;gap:10px}
.pop-row:last-child{border-bottom:none}
.pop-key{color:#94a3b8;flex-shrink:0}
.pop-val{color:#e2e8f0;font-weight:600;font-family:'Courier New',monospace;text-align:right}

#legend{position:fixed;bottom:12px;left:16px;pointer-events:none;z-index:10;
  background:rgba(10,13,20,.85);backdrop-filter:blur(6px);
  border:1px solid #1e2235;border-radius:8px;padding:10px 14px;max-width:220px}
.leg-row{display:flex;align-items:center;gap:7px;font-size:10.5px;color:#94a3b8;margin-bottom:4px}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.leg-line{width:16px;height:3px;border-radius:2px;flex-shrink:0}

#ctrl-hint{position:fixed;bottom:12px;right:16px;z-index:10;
  background:rgba(10,13,20,.82);backdrop-filter:blur(6px);
  border:1px solid #1e2235;border-radius:8px;padding:9px 13px;
  font-size:11px;color:#475569;line-height:1.7}

#view-label{position:fixed;top:64px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;color:#475569;letter-spacing:1px;
  text-transform:uppercase;pointer-events:none;z-index:10;
  background:rgba(10,13,20,.7);padding:4px 12px;border-radius:20px;
  border:1px solid #1e2235;white-space:nowrap}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div id="loading-text">Loading 3D model…</div></div>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="top-bar">
    <div class="logo"></span></div>
    <div class="badge"></div>
    <div class="view-btns">
      <button class="vb on" onclick="setView(0)">Open Housing</button>
      <button class="vb" onclick="setView(1)">Full System</button>
      <button class="vb" onclick="setView(2)">Board Close-up</button>
    </div>
  </div>
</div>

<div id="view-label">OPEN HOUSING · BOARD VISIBLE</div>
<div id="popup"></div>

<div id="legend">
  <div class="leg-row"><div class="leg-dot" style="background:#1d6b3a"></div>PCB substrate</div>
  <div class="leg-row"><div class="leg-dot" style="background:#2a4a7f"></div>WROOM module shield</div>
  <div class="leg-row"><div class="leg-dot" style="background:#d4a017"></div>Pin headers (gold)</div>
  <div class="leg-row"><div class="leg-dot" style="background:#1d4ed8"></div>BOOT / EN buttons</div>
  <div style="height:6px"></div>
  <div class="leg-row"><div class="leg-line" style="background:#f59e0b"></div>USB power cable</div>
  <div class="leg-row"><div class="leg-line" style="background:#3b82f6"></div>Voltage sense wire</div>
  <div class="leg-row"><div class="leg-line" style="background:#16a34a"></div>Current sense wire</div>
  <div class="leg-row"><div class="leg-line" style="background:#dc2626"></div>Temperature sense wire</div>
</div>

<div id="ctrl-hint">
  🖱 Drag — rotate<br>
  🖱 Scroll — zoom<br>
  👆 Click — inspect
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ══════════════════════════════════════════════════════════════════
//  SCENE SETUP
// ══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0a0d14,1);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0d14, 30, 90);
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 300);

const ambient = new THREE.AmbientLight(0x8eafd4, 0.75);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.15);
sun.position.set(8, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=60;
sun.shadow.camera.left=-20; sun.shadow.camera.right=20;
sun.shadow.camera.top=20; sun.shadow.camera.bottom=-20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x3b5fa0, 0.4);
fill.position.set(-6, 2, -4); scene.add(fill);
const rim = new THREE.PointLight(0x22c55e, 0.25, 25);
rim.position.set(-4, 6, -2); scene.add(rim);

const gGeo = new THREE.PlaneGeometry(60,60);
const gMat = new THREE.MeshStandardMaterial({color:0x0d1117, roughness:1});
const ground = new THREE.Mesh(gGeo, gMat);
ground.rotation.x = -Math.PI/2; ground.position.y = -0.02;
ground.receiveShadow = true; scene.add(ground);

// ── Orbit controls ──
let isDragging=false, prevMouse={x:0,y:0}, dragDistance=0;
let spherical={theta:0.6,phi:1.1,radius:18};
let targetSpherical={theta:0.6,phi:1.1,radius:18};

canvas.addEventListener('mousedown', e=>{isDragging=true; dragDistance=0; prevMouse={x:e.clientX,y:e.clientY}});
canvas.addEventListener('mouseup',   ()=>isDragging=false);
canvas.addEventListener('mouseleave',()=>isDragging=false);
canvas.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  const dx=(e.clientX-prevMouse.x)*0.008;
  const dy=(e.clientY-prevMouse.y)*0.008;
  dragDistance += Math.abs(dx)+Math.abs(dy);
  targetSpherical.theta -= dx;
  targetSpherical.phi = Math.max(0.15, Math.min(Math.PI*0.85, targetSpherical.phi+dy));
  prevMouse={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('wheel', e=>{
  targetSpherical.radius = Math.max(3, Math.min(45, targetSpherical.radius + e.deltaY*0.02));
},{passive:true});
let lastTouch=null;
canvas.addEventListener('touchstart', e=>{lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY}; dragDistance=0});
canvas.addEventListener('touchmove', e=>{
  if(!lastTouch) return;
  const dx=(e.touches[0].clientX-lastTouch.x)*0.01;
  const dy=(e.touches[0].clientY-lastTouch.y)*0.01;
  dragDistance += Math.abs(dx)+Math.abs(dy);
  targetSpherical.theta -= dx;
  targetSpherical.phi = Math.max(0.15,Math.min(Math.PI*0.85,targetSpherical.phi+dy));
  lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:true});

// ══════════════════════════════════════════════════════════════════
//  MATERIALS for non-loaded scene elements (housing, wires, system parts)
// ══════════════════════════════════════════════════════════════════

  panel:  new THREE.MeshStandardMaterial({color:0x1e3a5f, roughness:0.3, metalness:0.5}),
  panelCell:new THREE.MeshStandardMaterial({color:0x162c52, roughness:0.2, metalness:0.4}),
  battery:new THREE.MeshStandardMaterial({color:0x1f2937, roughness:0.6, metalness:0.3}),
  battYellow: new THREE.MeshStandardMaterial({color:0xca8a04, roughness:0.5}),
  ctrl:   new THREE.MeshStandardMaterial({color:0x1e293b, roughness:0.5, metalness:0.2}),
  ctrlScreen: new THREE.MeshStandardMaterial({color:0x0f172a,emissive:0x22c55e,emissiveIntensity:0.15}),
  wire_usb:   new THREE.MeshStandardMaterial({color:0xf59e0b, roughness:0.5}),
  wire_volt:  new THREE.MeshStandardMaterial({color:0x3b82f6, roughness:0.5}),
  wire_curr:  new THREE.MeshStandardMaterial({color:0x16a34a, roughness:0.5}),
  wire_temp:  new THREE.MeshStandardMaterial({color:0xdc2626, roughness:0.5}),
  wire_black: new THREE.MeshStandardMaterial({color:0x111827, roughness:0.6}),
  connector:  new THREE.MeshStandardMaterial({color:0x4b5563, roughness:0.3, metalness:0.6}),
  sensorBody: new THREE.MeshStandardMaterial({color:0x1f2937, roughness:0.5, metalness:0.2}),
  gland:  new THREE.MeshStandardMaterial({color:0x6b7280, roughness:0.4, metalness:0.5}),
};

function box(w,h,d,mat,x,y,z,cast=true){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.castShadow=cast; m.receiveShadow=true; return m;
}
function cyl(rt,rb,h,seg,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z); m.castShadow=true; return m;
}
function makeTube(pts, mat, radius=0.05){
  const curve=new THREE.CatmullRomCurve3(pts.map(p=>new THREE.Vector3(...p)));
  const geo=new THREE.TubeGeometry(curve,24,radius,7,false);
  const m=new THREE.Mesh(geo,mat); m.castShadow=true; return m;
}

const views=[]; let currentView=0;
const clickables=[]; // {mesh,title,sub,rows}
function regClick(mesh,title,sub,rows){ clickables.push({mesh,title,sub,rows}); }

    {k:'Key pins',v:'GPIO34, GPIO35, GPIO32, GND, 3V3, VIN'},
    {k:'GPIO34',v:'Voltage sense input (ADC)'}]},
  smd_large: {title:'Support ICs', sub:'USB-UART bridge & voltage regulator', rows:[
    {k:'CP2102/CH340',v:'USB-to-Serial bridge'},
    {k:'AMS1117',v:'5V → 3.3V LDO regulator, 800mA'}]},
  header_strips: {title:'GPIO Header Housings', sub:'Black plastic strip holding the pin headers', rows:[
    {k:'Count',v:'2 strips (left + right row)'},
    {k:'Material',v:'Black polyamide / nylon'},
    {k:'Function',v:'Insulates & spaces the 30 pin legs at 2.54mm pitch'},
    {k:'Note',v:'Distinct from the gold pin legs themselves'}]},
  smd_small: {title:'Passive Components', sub:'Resistors, capacitors, LEDs', rows:[
    {k:'Types',v:'0402/0603/1206 SMD R/C, LEDs'},
    {k:'Function',v:'Decoupling, pull-ups, status LEDs'}]},
};

function loadBoard(callback){
  loader.load(BOARD_URL, (gltf)=>{
    boardTemplate = gltf.scene;
    boardTemplate.scale.set(SCALE,SCALE,SCALE);
    boardTemplate.traverse(c=>{
      if(c.isMesh){
        c.castShadow=true; c.receiveShadow=true;
        if(c.material) c.material.roughness = Math.min(c.material.roughness??0.5, 0.6);
      }
    });
    callback();
  }, undefined, (err)=>{
    console.error('GLTF load error', err);
    document.getElementById('loading-text').innerHTML='Model failed to load.<br><span style="font-size:11px;color:#475569">This page needs internet access on first open (loads Three.js from a CDN). The 3D board model itself is embedded and does not need internet.</span>';
  });
}

function instanceBoard(){
  const inst = boardTemplate.clone(true);
  // Register clickables for each named part within this instance
  inst.traverse(c=>{
    if(c.isMesh && boardPartInfo[c.name]){
      const info = boardPartInfo[c.name];
      regClick(c, info.title, info.sub, info.rows);
    }
  });
  return inst;
}

// Real board footprint in scene units (mm * SCALE)
const BOARD_W = 28.6*SCALE, BOARD_L = 53.3*SCALE, BOARD_H = 13.7*SCALE;

// ══════════════════════════════════════════════════════════════════
//  VIEW 0: OPEN HOUSING — lid removed, board visible, wires exiting
// ══════════════════════════════════════════════════════════════════
function buildOpenHousing(){
  const g = new THREE.Group();

  // Housing: generous clearance around real board (28.6 x 53.3mm)
  const HW = BOARD_W + 1.6, HD = BOARD_L + 1.6, HH = 1.8;
  const wallT = 0.08;

  // Floor
  const floor = box(HW, wallT, HD, M.housingFloor, 0, -wallT/2, 0);
  floor.name='HousingFloor';
  g.add(floor);
  regClick(floor,'IP65 Housing — Base','Floor of the weatherproof enclosure',[
    {k:'External size',v:'100 × 75 × 38 mm'},{k:'IP rating',v:'IP65'},
    {k:'Lid',v:'Removed in this view to show board'},
    {k:'Material',v:'ABS / polycarbonate'},
  ]);

  // Side walls (4), lid omitted intentionally
  const wallMat = M.housing;
  const w1 = box(HW, HH, wallT, wallMat, 0, HH/2, -HD/2); g.add(w1);
  const w2 = box(HW, HH, wallT, wallMat, 0, HH/2,  HD/2); g.add(w2);
  const w3 = box(wallT, HH, HD, wallMat, -HW/2, HH/2, 0); g.add(w3);
  // Right wall has gaps for cable exits — build in segments
  const w4a = box(wallT, HH, HD*0.25, wallMat,  HW/2, HH/2, -HD*0.375); g.add(w4a);
  const w4b = box(wallT, HH, HD*0.2,  wallMat,  HW/2, HH/2, -HD*0.02); g.add(w4b);
  const w4c = box(wallT, HH, HD*0.25, wallMat,  HW/2, HH/2,  HD*0.375); g.add(w4c);

  // Mounting standoffs (4 corners)
  const standoffH=0.25;
  [[-HW/2+0.5,-HD/2+0.6],[HW/2-0.5,-HD/2+0.6],[-HW/2+0.5,HD/2-0.6],[HW/2-0.5,HD/2-0.6]].forEach(([x,z])=>{
    g.add(cyl(0.12,0.12,standoffH,10, M.housing, x,standoffH/2,z));
  });

  // ── Board: real GLTF model, sitting on standoffs ──
  const board = instanceBoard();
  board.rotation.x = -Math.PI/2; // GLTF is Z-up from CAD; rotate to Y-up scene
  board.position.set(0, standoffH+0.02, 0);
  g.add(board);

  // ── USB cable exiting through the housing wall (router power-cord style) ──
  // USB port is at the "north" short edge of the board (y=BOARD_L/2 in board-local, now z after rotation)
  const usbExitY = standoffH + 0.55;
  const usbCable = makeTube([
    [0, usbExitY, BOARD_L/2-0.15],
    [0, usbExitY+0.1, BOARD_L/2+0.5],
    [0, usbExitY+0.05, HD/2-0.05],
  ], M.wire_usb, 0.045);
  usbCable.name='USBCableInternal';
  g.add(usbCable);
  // Continue outside the housing
  const usbCableExt = makeTube([
    [0, usbExitY+0.05, HD/2-0.05],
    [0, usbExitY-0.3, HD/2+1.2],
    [0, usbExitY-0.9, HD/2+2.6],
  ], M.wire_usb, 0.045);
  usbCableExt.name='USBCableExternal';
  g.add(usbCableExt);
  // Cable gland where it exits
  const gland1 = cyl(0.14,0.14,0.22,12, M.gland, 0, usbExitY+0.02, HD/2);
  gland1.rotation.x=Math.PI/2;
  g.add(gland1);
  // USB plug end (router power-cord look)
  const plugBody = box(0.5,0.22,0.32, M.connector, 0, usbExitY-0.9, HD/2+2.8);
  plugBody.name='USBPlug';
  g.add(plugBody);
  regClick(usbCable,'USB Power & Data Cable',[
    {k:'Carries',v:'5V power + serial data (UART)'},
    {k:'Function',v:'Continuous power + to flash firmware'},
    {k:'Exit point',v:'Cable gland, rear wall'},
  
  ]);
  regClick(plugBody,'USB Plug — External End','',[
    {k:'Standard',v:'USB-A male'},{k:'Use',v:'Continuos power to the board, or flash firmware via UART'},
  ]);

  // ── Sensor wires — exiting through right-side gaps, router-antenna style ──
  const sensorY = standoffH + 0.4;
  const sensors = [
    {name:'VoltageSense', mat:M.wire_volt, z:-HD*0.3, label:'Voltage Sense Wire',
     sub:'Reads battery voltage via divider', rows:[
       {k:'Connects to',v:'GPIO34 (ADC1_CH6)'},{k:'Source',v:'Battery + via R1/R2 divider'},
       {k:'Range',v:'0–3.3V (scaled from 12–14V)'}]},
    {name:'CurrentSense', mat:M.wire_curr, z:-HD*0.05, label:'Current Sense Wire',
     sub:'Reads solar charging current', rows:[
       {k:'Connects to',v:'GPIO35 (ADC1_CH7)'},{k:'Sensor',v:'ACS712 current sensor module'},
       {k:'Measures',v:'Charging / load current in Amps'}]},
    {name:'TempSense', mat:M.wire_temp, z:HD*0.3, label:'Temperature Sense Wire',
     sub:'Monitors battery/enclosure temperature', rows:[
       {k:'Connects to',v:'GPIO32'},{k:'Sensor',v:'DS18B20 or NTC thermistor'},
       {k:'Threshold',v:'Alert above 60°C'}]},
  ];

  sensors.forEach((s,i)=>{
    // Wire from board edge, through wall gap, to external sensor box
    const exitX = HW/2;
    const wireIn = makeTube([
      [BOARD_W/2-0.2, sensorY, s.z*0.5],
      [exitX-0.3, sensorY, s.z*0.8],
      [exitX, sensorY, s.z],
    ], s.mat, 0.035);
    g.add(wireIn);
    const wireOut = makeTube([
      [exitX, sensorY, s.z],
      [exitX+0.7, sensorY-0.1, s.z*1.15],
      [exitX+1.5, sensorY-0.3, s.z*1.3],
    ], s.mat, 0.035);
    g.add(wireOut);
    // Small cable gland at exit
    const gl = cyl(0.07,0.07,0.16,10, M.gland, exitX, sensorY, s.z);
    gl.rotation.z=Math.PI/2;
    g.add(gl);
    // External sensor module box (router-antenna-port look)
    const sensorBox = box(0.55,0.35,0.4, M.sensorBody, exitX+1.7, sensorY-0.35, s.z*1.3);
    sensorBox.name=s.name;
    g.add(sensorBox);
    // Coloured tip to match wire
    const tip = box(0.15,0.1,0.42, s.mat, exitX+1.95, sensorY-0.35, s.z*1.3);
    g.add(tip);
    regClick(sensorBox, s.label, s.sub, s.rows);
    regClick(wireIn, s.label, s.sub, s.rows);
  });

  // Antenna-style label posts (visual cue: looks like router ports, each labelled by colour)
  g.position.y = 0;
  views.push(g); scene.add(g); g.visible=false;
}

    ring.position.set(5.3,0.8,-0.2); ring.rotation.y=Math.PI/2; ring.rotation.z=Math.PI/4;

  regClick(espHousing,'ESP32 Monitoring Unit','Real board model in IP65 housing',[

  g.add(makeTube([[-3,3.5,-0.5],[-2,2,0],[-1.1,1.5,0.3],[0,1.6,0.6]], M.wire_usb));
  g.add(makeTube([[-3,3.3,-0.3],[-2,1.8,0.1],[-1.1,1.3,0.35],[0,1.6,-0.4]], M.wire_black));

function buildCloseup(){

  board.scale.multiplyScalar(2.4);

  views.push(g); scene.add(g); g.visible=false;

// ══════════════════════════════════════════════════════════════════
//  RAYCASTING
// ══════════════════════════════════════════════════════════════════
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const popup=document.getElementById('popup');

canvas.addEventListener('click', e=>{
  if(dragDistance > 0.03) return; // ignore click-after-drag
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);

  const activeClickables=clickables.filter(c=>isChildOf(c.mesh, views[currentView]));
  const meshes=activeClickables.map(c=>c.mesh);
  const hits=raycaster.intersectObjects(meshes, true);

  if(hits.length>0){
    let hit=hits[0].object;
    let found=null, obj=hit;
    while(obj){
      found=activeClickables.find(c=>c.mesh===obj);
      if(found) break;
      obj=obj.parent;
    }
    if(found) showPopup(found, e.clientX, e.clientY);
    else hidePopup();
  } else hidePopup();
});

function isChildOf(mesh, group){
  let m=mesh;
  while(m){ if(m===group) return true; m=m.parent; }
  return false;
}
function showPopup(c, x, y){
  let html=`<div class="pop-sub">${c.sub}</div><div class="pop-title">${c.title}</div>`;
  c.rows.forEach(r=>{ html+=`<div class="pop-row"><span class="pop-key">${r.k}</span><span class="pop-val">${r.v}</span></div>`; });
  popup.innerHTML=html; popup.style.display='block';
  const pw=290, ph=popup.scrollHeight||160;
  let px=x+16, py=y-20;
  if(px+pw>window.innerWidth) px=x-pw-8;
  if(py+ph>window.innerHeight) py=window.innerHeight-ph-8;
  if(py<8) py=8;
  popup.style.left=px+'px'; popup.style.top=py+'px';
}
function hidePopup(){ popup.style.display='none'; }

// ══════════════════════════════════════════════════════════════════
//  VIEW SWITCHING
// ══════════════════════════════════════════════════════════════════
const viewNames=['OPEN HOUSING · BOARD VISIBLE','FULL SYSTEM','BOARD CLOSE-UP'];
const viewCams=[
  {theta:0.65,phi:0.95,radius:18},
  {theta:0.5,phi:1.05,radius:22},
  {theta:0.6,phi:0.9,radius:9},
];
function setView(i){
  views[currentView].visible=false;
  currentView=i;
  views[currentView].visible=true;
  const c=viewCams[i];
  targetSpherical.theta=c.theta; targetSpherical.phi=c.phi; targetSpherical.radius=c.radius;
  document.getElementById('view-label').textContent=viewNames[i];
  document.querySelectorAll('.vb').forEach((b,j)=>b.classList.toggle('on',j===i));
  hidePopup();
}

// ══════════════════════════════════════════════════════════════════
//  RESIZE + RENDER LOOP
// ══════════════════════════════════════════════════════════════════
function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();
const target=new THREE.Vector3(0,0.3,0);

function animate(){
  requestAnimationFrame(animate);
  spherical.theta+=(targetSpherical.theta-spherical.theta)*0.08;
  spherical.phi  +=(targetSpherical.phi  -spherical.phi  )*0.08;
  spherical.radius+=(targetSpherical.radius-spherical.radius)*0.08;
  const sinPhi=Math.sin(spherical.phi);
  camera.position.set(
    spherical.radius*sinPhi*Math.sin(spherical.theta),
    spherical.radius*Math.cos(spherical.phi)+1,
    spherical.radius*sinPhi*Math.cos(spherical.theta)
  );
  camera.lookAt(target);
  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════════════════
//  BOOT SEQUENCE
// ══════════════════════════════════════════════════════════════════
loadBoard(()=>{
  buildOpenHousing();
  buildFullSystem();
  buildCloseup();
  views[0].visible=true;
  document.getElementById('loading').style.display='none';
  animate();
});
